name: Build Devcontainers

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - ".devcontainer/**"
      - ".github/workflows/build-devcontainers.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".devcontainer/**"
      - ".github/workflows/build-devcontainers.yml"
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:
    inputs:
      push:
        description: "Push images to GHCR"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - ubuntu-noble
          - debian-trixie
          - wolfi
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: src/${{ matrix.variant }}/.devcontainer/Dockerfile
          failure-threshold: error
          no-fail: false

  devcontainer-plan:
    name: Validate Devcontainer Configs
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        variant:
          - ubuntu-noble
          - debian-trixie
          - wolfi
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Read merged devcontainer configuration
        run: |
          devcontainer read-configuration \
            --workspace-folder . \
            --config "src/${{ matrix.variant }}/.devcontainer/devcontainer.json" \
            --include-features-configuration \
            --include-merged-configuration

  publish:
    name: Publish Variant Images
    runs-on: ubuntu-latest
    needs: devcontainer-plan
    if: github.event_name == 'push' || github.event_name == 'schedule' || inputs.push == true
    strategy:
      fail-fast: false
      matrix:
        variant:
          - ubuntu-noble
          - debian-trixie
          - wolfi
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image with devcontainer CLI
        id: build
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          VARIANT: ${{ matrix.variant }}
        run: |
          set -euo pipefail

          image="${REGISTRY}/${IMAGE_NAME}:build-${VARIANT}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          devcontainer build \
            --workspace-folder . \
            --config "src/${VARIANT}/.devcontainer/devcontainer.json" \
            --image-name "${image}" \
            --platform linux/amd64

          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Verify Docker contract
        env:
          BUILT_IMAGE: ${{ steps.build.outputs.image }}
        run: |
          set -euo pipefail

          container="$(docker run -d --privileged "${BUILT_IMAGE}" sleep infinity)"
          cleanup() {
            docker rm -f "${container}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker exec "${container}" bash --noprofile --norc -c '
            set -euo pipefail
            command -v docker
            command -v dockerd
            for _ in $(seq 1 30); do
              if docker info >/dev/null 2>&1; then
                docker info --format "driver={{.Driver}} root={{.DockerRootDir}}"
                docker version
                docker run --rm hello-world
                exit 0
              fi
              sleep 1
            done
            docker version || true
            test -f /tmp/dockerd.log && tail -200 /tmp/dockerd.log || true
            exit 1
          '

      - name: Tag and push variant aliases
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          VARIANT: ${{ matrix.variant }}
          BUILT_IMAGE: ${{ steps.build.outputs.image }}
        run: |
          set -euo pipefail

          case "${VARIANT}" in
            ubuntu-noble)
              tags=(ubuntu-noble ubuntu-noble-dind latest codespaces)
              ;;
            debian-trixie)
              tags=(debian-trixie)
              ;;
            wolfi)
              tags=(wolfi secure)
              ;;
            *)
              echo "::error::Unsupported variant: ${VARIANT}"
              exit 1
              ;;
          esac

          for tag in "${tags[@]}"; do
            target="${REGISTRY}/${IMAGE_NAME}:${tag}"
            docker tag "${BUILT_IMAGE}" "${target}"
            docker push "${target}"
          done
