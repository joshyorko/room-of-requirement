name: Build Devcontainers

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - ".devcontainer/**"
      - "docker-bake.hcl"
      - ".github/workflows/build-devcontainers.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".devcontainer/**"
      - "docker-bake.hcl"
      - ".github/workflows/build-devcontainers.yml"
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:
    inputs:
      push:
        description: "Push images to GHCR"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - ubuntu-noble
          - debian-trixie
          - wolfi
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: src/${{ matrix.variant }}/.devcontainer/Dockerfile
          failure-threshold: error
          no-fail: false

  bake-plan:
    name: Validate Bake Plan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Print default variant bake plan
        run: docker buildx bake --print

      - name: Print Codespaces bake plan
        run: docker buildx bake --print codespaces

  publish:
    name: Publish Variant Images
    runs-on: ubuntu-latest
    needs: bake-plan
    if: github.event_name == 'push' || github.event_name == 'schedule' || inputs.push == true
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish default variants
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: docker buildx bake --push

      - name: Publish Codespaces alias
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: docker buildx bake --push codespaces
