  # ============================================================================
  # OpenSSL in Wolfi base
  # Wolfi latest still ships openssl 3.6.1-r3 on 2026-03-18. The image does not
  # expose an OpenSSL-backed TLS service, so we accept the distro risk until
  # Wolfi publishes patched packages.
  # ============================================================================
  - vulnerability: CVE-2026-2673
    package:
      name: openssl
      type: apk
  - vulnerability: CVE-2026-2673
    package:
      name: openssl-dev
      type: apk
